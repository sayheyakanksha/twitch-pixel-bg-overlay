<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream Starting Soon</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a12;
        font-family: "Press Start 2P", monospace;
      }

      /* --- pixel grid canvas --- */
      canvas#pixels {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.12;
        image-rendering: pixelated;
      }

      /* --- slow-moving star / particle layer --- */
      .stars {
        position: fixed;
        inset: 0;
        opacity: 0.06;
      }
      .stars span {
        position: absolute;
        display: block;
        background: #fff;
        border-radius: 0;
      }

      /* --- vignette --- */
      .vignette {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 45%,
          rgba(6, 6, 14, 0.85) 100%
        );
        pointer-events: none;
      }

      /* --- centre content --- */
      .content {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        z-index: 10;
      }

      /* decorative pixel bar */
      .pixel-bar {
        display: flex;
        gap: 6px;
      }
      .pixel-bar span {
        width: 8px;
        height: 8px;
        background: #c084fc;
        opacity: 0.5;
        animation: barPulse 2.4s ease-in-out infinite;
      }
      .pixel-bar span:nth-child(2) {
        animation-delay: 0.15s;
        background: #a78bfa;
      }
      .pixel-bar span:nth-child(3) {
        animation-delay: 0.3s;
        background: #818cf8;
      }
      .pixel-bar span:nth-child(4) {
        animation-delay: 0.45s;
        background: #6366f1;
      }
      .pixel-bar span:nth-child(5) {
        animation-delay: 0.6s;
        background: #818cf8;
      }
      .pixel-bar span:nth-child(6) {
        animation-delay: 0.75s;
        background: #a78bfa;
      }
      .pixel-bar span:nth-child(7) {
        animation-delay: 0.9s;
        background: #c084fc;
      }

      @keyframes barPulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scaleY(1);
        }
        50% {
          opacity: 1;
          transform: scaleY(1.8);
        }
      }

      /* main heading */
      .heading {
        font-size: 13px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #e2e0ff;
        text-shadow:
          0 0 6px rgba(167, 139, 250, 0.6),
          0 0 20px rgba(99, 102, 241, 0.3);
        animation: textGlow 3s ease-in-out infinite;
      }

      @keyframes textGlow {
        0%,
        100% {
          text-shadow:
            0 0 6px rgba(167, 139, 250, 0.4),
            0 0 20px rgba(99, 102, 241, 0.15);
        }
        50% {
          text-shadow:
            0 0 10px rgba(167, 139, 250, 0.8),
            0 0 30px rgba(99, 102, 241, 0.4);
        }
      }

      /* sub text */
      .sub {
        font-size: 8px;
        letter-spacing: 3px;
        color: #7c7a9a;
        animation: fadeInOut 4s ease-in-out infinite;
      }

      @keyframes fadeInOut {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      /* bottom decorative pixel bar */
      .pixel-bar.bottom span {
        width: 6px;
        height: 6px;
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <canvas id="pixels"></canvas>
    <div class="vignette"></div>

    <div class="content">
      <div class="pixel-bar">
        <span></span><span></span><span></span><span></span><span></span
        ><span></span><span></span>
      </div>
      <div class="heading">stream starting soon</div>
      <div class="sub">sit tight &mdash; be right there</div>
      <div class="pixel-bar bottom">
        <span></span><span></span><span></span><span></span><span></span
        ><span></span><span></span>
      </div>
    </div>

    <script>
      // --- Animated pixel-art background on canvas ---
      const canvas = document.getElementById("pixels");
      const ctx = canvas.getContext("2d");

      // low-res for chunky pixel look
      const COLS = 96;
      const ROWS = 54;
      canvas.width = COLS;
      canvas.height = ROWS;

      // colour palette (dark purples / indigos)
      const palette = [
        [16, 14, 28],
        [24, 20, 46],
        [34, 28, 64],
        [44, 36, 78],
        [28, 24, 52],
        [20, 18, 38],
      ];

      // each cell holds a brightness offset & speed
      const cells = [];
      for (let i = 0; i < COLS * ROWS; i++) {
        cells.push({
          base: Math.floor(Math.random() * palette.length),
          phase: Math.random() * Math.PI * 2,
          speed: 0.3 + Math.random() * 0.7,
          twinkle: Math.random() < 0.03, // rare bright pixel
        });
      }

      function draw(t) {
        const time = t * 0.001;
        const imgData = ctx.createImageData(COLS, ROWS);
        const d = imgData.data;

        for (let i = 0; i < cells.length; i++) {
          const c = cells[i];
          const wave = Math.sin(time * c.speed + c.phase) * 0.5 + 0.5;
          const col = palette[c.base];

          let r = col[0],
            g = col[1],
            b = col[2];

          // subtle brightness variation
          const bright = 0.7 + wave * 0.3;
          r = Math.floor(r * bright);
          g = Math.floor(g * bright);
          b = Math.floor(b * bright);

          // rare twinkling "star" pixels
          if (c.twinkle) {
            const tw = Math.sin(time * 1.5 + c.phase) * 0.5 + 0.5;
            if (tw > 0.85) {
              r = Math.min(255, r + 120);
              g = Math.min(255, g + 100);
              b = Math.min(255, b + 160);
            }
          }

          const idx = i * 4;
          d[idx] = r;
          d[idx + 1] = g;
          d[idx + 2] = b;
          d[idx + 3] = 255;
        }

        ctx.putImageData(imgData, 0, 0);
        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    </script>
  </body>
</html>
